services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: bcm-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword123}
      MYSQL_DATABASE: bcm
      MYSQL_USER: ${DB_USERNAME:-bcm_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-bcm_password}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./bcm-v2-backend/sql/DDL:/docker-entrypoint-initdb.d/01-schema
      - ./bcm-v2-backend/sql/DML:/docker-entrypoint-initdb.d/02-data
    networks:
      - bcm-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-rootpassword123}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Spring Boot Backend
  backend:
    build:
      context: ./bcm-v2-backend
      dockerfile: Dockerfile
    container_name: bcm-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_URL: jdbc:mysql://mysql:3306/bcm?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      DB_USERNAME: ${DB_USERNAME:-bcm_user}
      DB_PASSWORD: ${DB_PASSWORD:-bcm_password}
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-change-in-production-min-256-bits}
      JWT_EXPIRATION_MS: 86400000
      SPRING_PROFILES_ACTIVE: prod
      MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      FRONTEND_BASE_URL: http://localhost:3000
      MANAGEMENT_HEALTH_MAIL_ENABLED: "false"
    ports:
      - "8090:8090"
    networks:
      - bcm-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8090/api/v1/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

   # Next.js Frontend
  frontend:
    build:
      context: ./bcm-v2-frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8090/api/v1
    container_name: bcm-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8090/api/v1
    ports:
      - "3000:3000"
    networks:
      - bcm-network

networks:
  bcm-network:
    driver: bridge

volumes:
  mysql_data:
    driver: local